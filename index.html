<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Gut Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0a0a0a;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body {
    padding: 24px 20px 60px;
    max-width: 560px;
    margin: 0 auto;
  }

  /* ---------- PAGE TURN ANIMATION ---------- */
  .flipper {
    perspective: 1400px;
  }
  .card {
    transform-origin: center center;
    transform: rotateY(0deg);
    opacity: 1;
    transition: transform 0.32s ease-in, opacity 0.32s ease-in;
    backface-visibility: hidden;
  }
  .card.flip-out {
    transform: rotateY(90deg);
    opacity: 0;
  }
  .card.flip-in-start {
    transform: rotateY(-90deg);
    opacity: 0;
    transition: none;
  }
  .card.flip-in {
    transform: rotateY(0deg);
    opacity: 1;
    transition: transform 0.32s ease-out, opacity 0.32s ease-out;
  }
  @media (prefers-reduced-motion: reduce) {
    .card, .card.flip-out, .card.flip-in, .card.flip-in-start {
      transform: none !important;
      opacity: 1 !important;
      transition: none !important;
    }
  }

  /* ---------- HEADER ---------- */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #c4c4c4;
  }
  .subtitle {
    font-size: 13px;
    color: #6b6b6b;
    margin-top: 2px;
  }
  .switch-btn {
    background: transparent;
    color: #7a7a7a;
    border: 1px solid #252525;
    border-radius: 999px;
    padding: 6px 11px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .switch-btn:active { transform: scale(0.96); }
  .switch-btn:hover { color: #c4c4c4; border-color: #3a3a3a; }

  /* ---------- FORM ---------- */
  label.section {
    display: block;
    font-size: 13px;
    color: #9a9a9a;
    margin-bottom: 10px;
    margin-top: 22px;
  }
  label.section:first-of-type { margin-top: 0; }
  textarea {
    width: 100%;
    min-height: 140px;
    background: #141414;
    color: #f0f0f0;
    border: 1px solid #232323;
    border-radius: 12px;
    padding: 14px 15px;
    font-size: 16px;
    font-family: inherit;
    line-height: 1.45;
    resize: none;
    overflow: hidden;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #3a3a3a; }
  textarea::placeholder { color: #4a4a4a; }
  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .pill {
    background: #141414;
    color: #9a9a9a;
    border: 1px solid #232323;
    border-radius: 999px;
    padding: 9px 14px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .pill:active { transform: scale(0.97); }
  .pill.active {
    background: #e8e8e8;
    color: #0a0a0a;
    border-color: #e8e8e8;
  }
  button.go {
    display: block;
    width: 100%;
    margin-top: 32px;
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  button.go:active { transform: scale(0.99); }
  button.go:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- OUTPUT ---------- */
  .output { margin-top: 32px; display: none; }
  .output.show { display: block; }
  .block {
    background: #121212;
    border: 1px solid #1e1e1e;
    border-radius: 12px;
    padding: 16px 16px 18px;
    margin-bottom: 12px;
  }
  .block h3 {
    font-size: 12px;
    font-weight: 500;
    color: #6b6b6b;
    text-transform: lowercase;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }
  .label-big {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .why, .block-text {
    font-size: 15px;
    color: #c8c8c8;
    line-height: 1.5;
  }
  .label-green  { color: #7fd18b; }
  .label-red    { color: #ff6b6b; }
  .label-amber  { color: #f0c674; }
  .label-purple { color: #b49cff; }
  .label-blue   { color: #8ecaff; }
  .rewrite-text {
    font-size: 16px;
    color: #e8e8e8;
    background: #0f1a0f;
    border: 1px solid #1f3a1f;
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 6px;
    font-family: inherit;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
    margin-bottom: 12px;
  }
  .action-btn {
    flex: 1 1 auto;
    background: #141414;
    color: #c4c4c4;
    border: 1px solid #252525;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.12s;
  }
  .action-btn:active { transform: scale(0.98); }
  .action-btn:hover { border-color: #3a3a3a; color: #e8e8e8; }
  .action-btn.saved { color: #7fd18b; border-color: #2d4a30; }

  .loading {
    text-align: center;
    color: #6b6b6b;
    font-size: 14px;
    margin-top: 32px;
    display: none;
  }
  .loading.show { display: block; }
  .dots::after {
    content: '';
    animation: dots 1.4s infinite;
  }
  @keyframes dots {
    0%, 20% { content: '.'; }
    40% { content: '..'; }
    60%, 100% { content: '...'; }
  }
  .error {
    color: #ff6b6b;
    font-size: 14px;
    margin-top: 20px;
    text-align: center;
    display: none;
  }
  .error.show { display: block; }

  .crisis {
    background: #1a0f0f;
    border: 1px solid #4a2020;
    color: #ffb3b3;
    padding: 18px;
    border-radius: 12px;
    margin-top: 24px;
    display: none;
  }
  .crisis.show { display: block; }
  .crisis strong { color: #ffd4d4; font-size: 15px; }
  .crisis .line { margin-top: 10px; font-size: 15px; line-height: 1.5; }
</style>
</head>
<body>

<div class="flipper">
  <div class="card" id="card">
    <header class="top">
      <div>
        <h1 id="title">Gut Check</h1>
        <div class="subtitle" id="subtitle">read it like she will</div>
      </div>
      <button class="switch-btn" id="switch-btn">switch</button>
    </header>

    <label class="section" for="draft">what are you about to send?</label>
    <textarea id="draft" placeholder="What you thinking?"></textarea>

    <div id="sections"></div>

    <button class="go" id="go-btn">cook it</button>

    <div class="loading" id="loading"><span class="dots" id="loading-text">cooking</span></div>
    <div class="error" id="error"></div>

    <div class="crisis" id="crisis">
      <strong>hey — pause on the text.</strong>
      <div class="line">some of what you wrote sounds heavy. talk to a real person before anything else.</div>
      <div class="line">call or text <strong>988</strong>. it's free, 24/7. they listen.</div>
      <div class="line">or reach someone you trust right now. the text can wait.</div>
    </div>

    <div class="output" id="output"></div>
  </div>
</div>

<script>
/* ========== CONFIG ========== */
const API_ENDPOINT = 'https://gut-check-api.tradewindlabs.workers.dev/api/check';
const HISTORY_LIMIT = 10;
const HISTORY_SEND_COUNT = 3;

/* ========== API PAYLOAD BUILDER ==========
 * This builds the JSON body sent to our backend.
 * The browser never talks to Anthropic directly.
 * The backend owns the system prompt and API key.
 */
function buildPromptPayload(formState, recentHistory) {
  return {
    mode: formState.mode,
    draft: formState.draft,
    recipientContext: formState.recipientContext,
    goal: formState.goal,
    intensity: formState.intensity,
    recentHistory: Array.isArray(recentHistory) ? recentHistory : []
  };
}

/* ========== BACKEND SYSTEM PROMPTS ==========
 * These are reference prompts for the future /api/check backend.
 * They are comments only. The frontend should not send these prompts directly.
 * The real backend should choose the correct system prompt based on mode.
 *
 * --- GUT CHECK SYSTEM PROMPT ---
 *
 * You are Gut Check, a blunt but caring text-review tool.
 *
 * The user is about to send a message during an emotionally charged relationship
 * situation. Your job is to protect them from sending something reactive, needy,
 * cruel, manipulative, unsafe, or likely to make things worse.
 *
 * Do not flatter them. Do not give multiple options. Give one clear read and one
 * clear recommendation.
 *
 * Use their voice when rewriting:
 * - casual
 * - lowercase is okay
 * - short sentences
 * - no polished therapy-speak
 * - no corporate tone
 * - no long paragraphs
 * - emojis only if the original style suggests it
 *
 * Return JSON only with:
 * {
 *   "read_label": string,
 *   "read_why": string,
 *   "she_hears": string,
 *   "risk_level": "LOW" | "MEDIUM" | "HIGH" | "CRISIS",
 *   "send_recommendation": "SEND IT" | "WAIT" | "DON'T SEND",
 *   "send_why": string,
 *   "rewrite": string | null,
 *   "cooldown_minutes": number,
 *   "pattern_note": string | null
 * }
 *
 * If the message includes self-harm, suicidal intent, threats, stalking, coercion,
 * or violence, mark risk_level as CRISIS or HIGH and do not provide a relationship-
 * optimizing rewrite. Encourage immediate real-world help. For suicide/self-harm in
 * the U.S., mention calling or texting 988.
 *
 * --- GAY CHECK SYSTEM PROMPT ---
 *
 * You are Gay Check, a blunt but caring text-review tool.
 *
 * The user is about to send a message to a man where there may be friendship,
 * attraction, ambiguity, history, or emotional stakes.
 *
 * Your job is not to predict whether he likes the user. Your job is to read the
 * signal the message sends, how it may land, whether it is too intense for the
 * context, and whether it protects the user's dignity.
 *
 * Be honest, not cruel. Do not flatter. Do not catastrophize. Do not turn
 * ambiguity into certainty.
 *
 * Give one clear read and one recommendation.
 *
 * When rewriting, preserve the user's casual voice:
 * - casual
 * - human
 * - not therapy-speak
 * - not overly polished
 * - can be lowercase
 * - short enough to actually text
 *
 * Return JSON only with:
 * {
 *   "read_label": string,
 *   "read_why": string,
 *   "he_hears": string,
 *   "signal_level": "FRIENDLY" | "DENIABLE" | "FLIRTY" | "VULNERABLE" | "TOO MUCH",
 *   "risk_level": "LOW" | "MEDIUM" | "HIGH",
 *   "send_recommendation": "SEND IT" | "WAIT" | "DON'T SEND",
 *   "send_why": string,
 *   "rewrite": string | null,
 *   "cooldown_minutes": number,
 *   "dignity_check": string,
 *   "pattern_note": string | null
 * }
 *
 * If the draft includes threats, coercion, self-harm, suicidal ideation, stalking,
 * or pressure for sex/romance after rejection, do not optimize the text. Recommend
 * pausing and getting real support if needed.
 */

/* ========== MODE DEFINITIONS ========== */
const MODES = {
  gut: {
    key: 'gut',
    title: 'Gut Check',
    subtitle: 'read it like she will',
    placeholder: 'What you thinking?',
    submitLabel: 'cook it',
    loadingLabel: 'cooking',
    errorMessage: "couldn't cook that, try again",
    historyKey: 'gutCheckHistory',
    sections: [
      { key: 'recipientContext', label: 'to who?',
        options: ['Her', 'Ex', 'Friend', 'Other'] },
      { key: 'goal', label: 'what do you want?',
        options: ['Get back together', 'Move on', 'Apologize', 'Get clarity', 'Just venting', 'Not sure'] },
      { key: 'intensity', label: 'how hot are you right now?',
        options: ['Chill', 'Hurt', 'Mad', 'Spiraling'] }
    ],
    outputBlocks: [
      { type: 'read' },
      { type: 'text', title: 'what she hears', field: 'she_hears' },
      { type: 'send' },
      { type: 'rewrite' },
      { type: 'cooldown' },
      { type: 'pattern' }
    ]
  },
  gay: {
    key: 'gay',
    title: 'Gay Check',
    subtitle: 'read it like he will',
    placeholder: 'what are you trying not to say?',
    submitLabel: 'check the gay',
    loadingLabel: 'checking',
    errorMessage: "couldn't check that, try again",
    historyKey: 'gayCheckHistory',
    sections: [
      { key: 'recipientContext', label: 'who is he?',
        options: ['Friend', 'Roommate', 'Ex-ish', 'Crush', 'Complicated', 'Other'] },
      { key: 'goal', label: 'what are you trying to do?',
        options: ['Be normal', 'Flirt a little', 'Say the thing', 'Test the waters', 'Not scare him off', 'No idea'] },
      { key: 'intensity', label: 'how brave are we being?',
        options: ['Normal human', 'Deniable', 'Flirting with a helmet on', 'Heart on the table', 'Felony vulnerability'] }
    ],
    outputBlocks: [
      { type: 'read' },
      { type: 'text', title: 'what he hears', field: 'he_hears' },
      { type: 'signal' },
      { type: 'send' },
      { type: 'text', title: 'dignity check', field: 'dignity_check' },
      { type: 'rewrite' },
      { type: 'cooldown' },
      { type: 'pattern' }
    ]
  }
};

let currentMode = 'gut';
let lastResponse = null;
const selections = { recipientContext: null, goal: null, intensity: null };

/* ========== LOCAL STORAGE ========== */
function loadHistory(modeKey) {
  try {
    const raw = localStorage.getItem(MODES[modeKey].historyKey);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveHistoryItem(modeKey, item) {
  try {
    const list = loadHistory(modeKey);
    list.unshift(item);
    const trimmed = list.slice(0, HISTORY_LIMIT);
    localStorage.setItem(MODES[modeKey].historyKey, JSON.stringify(trimmed));
  } catch (e) { /* storage full or blocked */ }
}

function recentHistory(modeKey) {
  return loadHistory(modeKey).slice(0, HISTORY_SEND_COUNT);
}

function buildHistoryItem(modeKey, draft, resp) {
  return {
    timestamp: Date.now(),
    mode: modeKey,
    draft,
    recipientContext: selections.recipientContext,
    goal: selections.goal,
    intensity: selections.intensity,
    recommendation: resp.send_recommendation || null,
    risk_level: resp.risk_level || null,
    signal_level: resp.signal_level || null,
    read_label: resp.read_label || null
  };
}

/* ========== RENDERING ========== */
const els = {
  card: document.getElementById('card'),
  title: document.getElementById('title'),
  subtitle: document.getElementById('subtitle'),
  switchBtn: document.getElementById('switch-btn'),
  draft: document.getElementById('draft'),
  sections: document.getElementById('sections'),
  goBtn: document.getElementById('go-btn'),
  loading: document.getElementById('loading'),
  loadingText: document.getElementById('loading-text'),
  error: document.getElementById('error'),
  crisis: document.getElementById('crisis'),
  output: document.getElementById('output')
};

function applyMode(modeKey) {
  const m = MODES[modeKey];
  currentMode = modeKey;
  els.title.textContent = m.title;
  els.subtitle.textContent = m.subtitle;
  els.draft.placeholder = m.placeholder;
  els.goBtn.textContent = m.submitLabel;
  els.loadingText.textContent = m.loadingLabel;
  document.title = m.title;
  renderSections(m);
  clearOutput();
}

function renderSections(mode) {
  els.sections.innerHTML = '';
  Object.keys(selections).forEach(k => selections[k] = null);
  mode.sections.forEach(section => {
    const label = document.createElement('label');
    label.className = 'section';
    label.textContent = section.label;
    const pills = document.createElement('div');
    pills.className = 'pills';
    pills.dataset.key = section.key;
    section.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'pill';
      btn.dataset.value = opt;
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        pills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        selections[section.key] = opt;
      });
      pills.appendChild(btn);
    });
    els.sections.appendChild(label);
    els.sections.appendChild(pills);
  });
}

function clearOutput() {
  els.output.classList.remove('show');
  els.output.innerHTML = '';
  els.error.classList.remove('show');
  els.crisis.classList.remove('show');
  lastResponse = null;
}

function labelColorClass(value) {
  const v = (value || '').toUpperCase();
  if (v === 'SEND IT' || v === 'YES' || v === 'LOW' || v === 'FRIENDLY') return 'label-green';
  if (v === "DON'T SEND" || v === 'NO' || v === 'HIGH' || v === 'TOO MUCH' || v === 'CRISIS') return 'label-red';
  if (v === 'WAIT' || v === 'MEDIUM' || v === 'DENIABLE') return 'label-amber';
  if (v === 'VULNERABLE') return 'label-purple';
  if (v === 'FLIRTY') return 'label-blue';
  return '';
}

function makeBlock(title, contentNode) {
  const block = document.createElement('div');
  block.className = 'block';
  const h = document.createElement('h3');
  h.textContent = title;
  block.appendChild(h);
  block.appendChild(contentNode);
  return block;
}

function textNode(str, className = 'block-text') {
  const d = document.createElement('div');
  d.className = className;
  d.textContent = str || '';
  return d;
}

function bigLabel(value, why) {
  const wrap = document.createElement('div');
  const big = document.createElement('div');
  big.className = 'label-big ' + labelColorClass(value);
  big.textContent = value || '';
  wrap.appendChild(big);
  if (why) {
    const w = document.createElement('div');
    w.className = 'why';
    w.textContent = why;
    wrap.appendChild(w);
  }
  return wrap;
}

function renderOutput(mode, resp) {
  els.output.innerHTML = '';

  mode.outputBlocks.forEach(spec => {
    if (spec.type === 'read') {
      const content = bigLabel(resp.read_label, resp.read_why);
      els.output.appendChild(makeBlock('the read', content));
    } else if (spec.type === 'text') {
      const val = resp[spec.field];
      if (!val) return;
      els.output.appendChild(makeBlock(spec.title, textNode(val)));
    } else if (spec.type === 'signal') {
      if (!resp.signal_level) return;
      const content = bigLabel(resp.signal_level, null);
      els.output.appendChild(makeBlock('signal', content));
    } else if (spec.type === 'send') {
      const content = bigLabel(resp.send_recommendation, resp.send_why);
      els.output.appendChild(makeBlock('send?', content));
    } else if (spec.type === 'rewrite') {
      if (!resp.rewrite || !resp.rewrite.trim()) return;
      const t = document.createElement('div');
      t.className = 'rewrite-text';
      t.textContent = resp.rewrite.trim();
      els.output.appendChild(makeBlock('better version', t));
    } else if (spec.type === 'cooldown') {
      if (!resp.cooldown_minutes || resp.cooldown_minutes <= 0) return;
      const mins = resp.cooldown_minutes;
      const txt = `sit with it for ${mins} minute${mins === 1 ? '' : 's'} before you decide.`;
      els.output.appendChild(makeBlock('cooldown', textNode(txt)));
    } else if (spec.type === 'pattern') {
      if (!resp.pattern_note) return;
      els.output.appendChild(makeBlock('pattern', textNode(resp.pattern_note)));
    }
  });

  const actions = document.createElement('div');
  actions.className = 'actions';

  if (resp.rewrite && resp.rewrite.trim()) {
    const copyBtn = document.createElement('button');
    copyBtn.className = 'action-btn';
    copyBtn.textContent = 'copy better version';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(resp.rewrite.trim()).then(() => {
        copyBtn.textContent = 'copied';
        copyBtn.classList.add('saved');
        setTimeout(() => {
          copyBtn.textContent = 'copy better version';
          copyBtn.classList.remove('saved');
        }, 1500);
      }).catch(() => { copyBtn.textContent = 'copy failed'; });
    });
    actions.appendChild(copyBtn);
  }

  // auto-save already happened on submit; this button is a visible confirmation.
  const saveBtn = document.createElement('button');
  saveBtn.className = 'action-btn';
  saveBtn.textContent = 'save this read';
  saveBtn.addEventListener('click', () => {
    saveBtn.textContent = 'saved';
    saveBtn.classList.add('saved');
    setTimeout(() => {
      saveBtn.textContent = 'save this read';
      saveBtn.classList.remove('saved');
    }, 1500);
  });
  actions.appendChild(saveBtn);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'action-btn';
  clearBtn.textContent = 'clear';
  clearBtn.addEventListener('click', () => {
    els.draft.value = '';
    els.draft.style.height = '';
    document.querySelectorAll('.pill.active').forEach(p => p.classList.remove('active'));
    Object.keys(selections).forEach(k => selections[k] = null);
    clearOutput();
    els.draft.focus();
  });
  actions.appendChild(clearBtn);

  els.output.appendChild(actions);
  els.output.classList.add('show');
}

/* ========== PAGE TURN ANIMATION ========== */
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let animating = false;

function switchMode() {
  if (animating) return;
  const next = currentMode === 'gut' ? 'gay' : 'gut';

  if (reducedMotion) {
    applyMode(next);
    window.scrollTo({ top: 0, behavior: 'auto' });
    return;
  }

  animating = true;
  els.card.classList.add('flip-out');
  setTimeout(() => {
    applyMode(next);
    window.scrollTo({ top: 0, behavior: 'auto' });
    els.card.classList.remove('flip-out');
    els.card.classList.add('flip-in-start');
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        els.card.classList.remove('flip-in-start');
        els.card.classList.add('flip-in');
        setTimeout(() => {
          els.card.classList.remove('flip-in');
          animating = false;
        }, 340);
      });
    });
  }, 320);
}

/* ========== API CALL ========== */
async function submit() {
  clearOutput();
  const draft = els.draft.value.trim();
  if (!draft) {
    els.error.textContent = 'type something first';
    els.error.classList.add('show');
    return;
  }

  const mode = MODES[currentMode];
  els.goBtn.disabled = true;
  els.loading.classList.add('show');

  const formState = {
    mode: currentMode,
    draft,
    recipientContext: selections.recipientContext,
    goal: selections.goal,
    intensity: selections.intensity
  };
  const payload = buildPromptPayload(formState, recentHistory(currentMode));

  try {
    const res = await fetch(API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('api');
    const data = await res.json();
    els.loading.classList.remove('show');

    if (currentMode === 'gut' && (data.risk_level || '').toUpperCase() === 'CRISIS') {
      els.crisis.classList.add('show');
      lastResponse = data;
      els.goBtn.disabled = false;
      return;
    }

    lastResponse = data;
    saveHistoryItem(currentMode, buildHistoryItem(currentMode, draft, data));
    renderOutput(mode, data);
  } catch (err) {
    els.loading.classList.remove('show');
    els.error.textContent = mode.errorMessage;
    els.error.classList.add('show');
  } finally {
    els.goBtn.disabled = false;
  }
}

/* ========== WIRING ========== */
els.draft.addEventListener('input', () => {
  els.draft.style.height = 'auto';
  els.draft.style.height = Math.max(140, els.draft.scrollHeight) + 'px';
});
els.goBtn.addEventListener('click', submit);
els.switchBtn.addEventListener('click', switchMode);

applyMode('gut');
</script>
</body>
</html>
